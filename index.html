<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MFC Calibration</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
  :root {
    --bg:          #0a0d12;
    --bg-grid:     #12161e;
    --panel:       #141921;
    --panel-2:     #1a2029;
    --panel-hi:    #212936;
    --border:      #262f3d;
    --border-hi:   #364152;
    --text:        #e6ebf2;
    --text-dim:    #9aa4b7;
    --text-mute:   #6b7487;
    --accent:      #ffb454;
    --accent-dim:  #b87a2c;
    --accent-soft: #ffb45420;
    --success:     #4ade80;
    --danger:      #f87171;
    --danger-soft: #f8717120;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', system-ui, sans-serif;
    font-weight: 400;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv11";
  }

  body {
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, #ffb4540a, transparent 70%),
      linear-gradient(var(--bg), var(--bg));
    background-attachment: fixed;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--bg-grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: .35;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(ellipse 100% 70% at 50% 40%, #000 40%, transparent 100%);
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 28px 64px;
  }

  /* ---------- Header ---------- */
  header.masthead {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 24px;
    gap: 24px;
    flex-wrap: wrap;
  }
  header.masthead h1 {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.02em;
  }
  header.masthead h1 .dot {
    color: var(--accent);
    margin-right: 2px;
  }
  header.masthead h1 .sub {
    color: var(--text-mute);
    font-weight: 400;
    margin-left: 10px;
    font-size: 13px;
    letter-spacing: 0;
  }
  header.masthead .meta {
    color: var(--text-mute);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ---------- Tabs ---------- */
  .tabs {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
    overflow-x: auto;
    scrollbar-width: thin;
  }
  .tab {
    background: transparent;
    border: 1px solid transparent;
    border-bottom: none;
    color: var(--text-dim);
    padding: 10px 18px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 6px 6px 0 0;
    position: relative;
    bottom: -1px;
    white-space: nowrap;
    transition: all .15s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tab:hover {
    color: var(--text);
    background: var(--panel);
  }
  .tab.active {
    background: var(--panel);
    border-color: var(--border);
    border-bottom-color: var(--panel);
    color: var(--text);
  }
  .tab.active::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 2px;
    background: var(--accent);
    border-radius: 2px;
  }
  .tab .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-mute);
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 3px;
  }
  .tab-add {
    background: transparent;
    border: 1px dashed var(--border-hi);
    color: var(--text-mute);
    width: 34px;
    height: 34px;
    font-size: 18px;
    cursor: pointer;
    border-radius: 6px;
    margin-left: 8px;
    align-self: center;
    transition: all .15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tab-add:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-soft);
  }

  /* ---------- Layout ---------- */
  .grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr);
    gap: 20px;
  }
  @media (max-width: 960px) {
    .grid { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px;
  }
  .card + .card { margin-top: 20px; }

  .card-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-mute);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-title::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent);
  }
  .card-title .actions {
    margin-left: auto;
    display: flex;
    gap: 6px;
  }

  /* ---------- Info row ---------- */
  .info-row {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr auto;
    gap: 12px;
    align-items: end;
  }
  @media (max-width: 720px) {
    .info-row { grid-template-columns: 1fr 1fr; }
    .info-row .danger-btn { grid-column: 1 / -1; }
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .field label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-mute);
  }
  input[type="text"], input[type="number"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    border-radius: 6px;
    outline: none;
    transition: border-color .15s;
    width: 100%;
  }
  input[type="text"] { font-family: 'Outfit', sans-serif; }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text-mute); }

  /* ---------- Buttons ---------- */
  button {
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-weight: 500;
    border-radius: 6px;
    transition: all .15s ease;
    border: 1px solid transparent;
  }
  .btn {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 14px;
    font-size: 13px;
  }
  .btn:hover {
    border-color: var(--border-hi);
    background: var(--panel-hi);
  }
  .btn-primary {
    background: var(--accent);
    color: #1a1208;
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-sm {
    padding: 5px 10px;
    font-size: 11px;
  }
  .danger-btn {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger-soft);
    padding: 9px 14px;
    font-size: 12px;
  }
  .danger-btn:hover {
    background: var(--danger-soft);
    border-color: var(--danger);
  }

  /* ---------- Data table ---------- */
  .table-wrap {
    max-height: 380px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 12px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead {
    position: sticky;
    top: 0;
    background: var(--panel-2);
    z-index: 2;
  }
  th {
    text-align: left;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-mute);
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  th.num { text-align: right; }
  th.idx { width: 34px; text-align: center; }
  th.act { width: 40px; }
  td {
    padding: 4px;
    border-bottom: 1px solid var(--border);
  }
  td.idx {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-mute);
    padding: 0 4px;
  }
  td input {
    background: transparent;
    border: 1px solid transparent;
    text-align: right;
    padding: 8px 10px;
    border-radius: 4px;
  }
  td input:hover { border-color: var(--border); }
  td input:focus { border-color: var(--accent); background: var(--bg); }
  .row-del {
    background: transparent;
    color: var(--text-mute);
    border: none;
    width: 28px;
    height: 28px;
    font-size: 14px;
    border-radius: 4px;
  }
  .row-del:hover { color: var(--danger); background: var(--danger-soft); }

  tr.invalid td input { color: var(--danger); }

  .data-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* ---------- Chart ---------- */
  .chart-wrap {
    height: 340px;
    position: relative;
  }
  .chart-empty {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    color: var(--text-mute);
    font-size: 13px;
    pointer-events: none;
  }
  .chart-empty .big {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* ---------- Stats ---------- */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }
  .stat {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
  }
  .stat .label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-mute);
    margin-bottom: 4px;
  }
  .stat .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
  }
  .stat .value.na { color: var(--text-mute); }

  .equation {
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    padding: 12px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--text);
    overflow-x: auto;
    white-space: nowrap;
  }
  .equation .mute { color: var(--text-mute); }

  /* ---------- Calculators ---------- */
  .calc {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 14px;
    align-items: center;
    padding: 14px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-top: 10px;
  }
  .calc + .calc { margin-top: 10px; }
  .calc .field { gap: 4px; }
  .calc .arrow {
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    padding-top: 16px;
  }
  .calc .result {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 10px 12px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--accent);
    min-height: 41px;
    display: flex;
    align-items: center;
  }
  .calc .result.na { color: var(--text-mute); font-size: 12px; }
  @media (max-width: 520px) {
    .calc { grid-template-columns: 1fr; }
    .calc .arrow { transform: rotate(90deg); padding: 0; justify-self: center; }
  }

  /* ---------- Correction factor ---------- */
  .cf-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: end;
    margin-bottom: 4px;
  }
  .cf-hint {
    font-size: 11px;
    color: var(--text-mute);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 8px;
    line-height: 1.5;
  }

  /* ---------- Misc ---------- */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--panel-hi);
    border: 1px solid var(--border-hi);
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transition: all .2s ease;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-mute);
  }
  .empty-state .big {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    color: var(--text-dim);
  }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-hi); }
</style>
</head>
<body>

<div class="app">

  <header class="masthead">
    <h1>
      <span class="dot">◆</span>MFC&nbsp;CALIBRATION
      <span class="sub">mass flow controller calibration workbench</span>
    </h1>
    <div class="meta" id="meta">—</div>
  </header>

  <nav class="tabs" id="tabs"></nav>

  <div id="workspace"></div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ================================================================
   MFC Calibration — single-file app
   Storage: localStorage["mfc-calibration-app-v1"]
   ================================================================ */

const STORAGE_KEY = 'mfc-calibration-app-v1';

/* ---------- State ---------- */
let state = load() || {
  version: 1,
  activeTabId: null,
  tabs: []
};

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed || !Array.isArray(parsed.tabs)) return null;
    return parsed;
  } catch (e) { return null; }
}
function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    toast('Failed to save — storage may be full');
  }
}

function uid() {
  return 'c' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
}

function newTab(name = 'Calibration ' + (state.tabs.length + 1)) {
  return {
    id: uid(),
    name,
    gas: '',
    units: 'sccm',
    points: [ { x: '', y: '' }, { x: '', y: '' }, { x: '', y: '' } ],
    correctionFactor: '1',
    calcSetInput: '',
    calcActualInput: ''
  };
}

if (state.tabs.length === 0) {
  const t = newTab('Calibration 1');
  state.tabs.push(t);
  state.activeTabId = t.id;
  save();
}
if (!state.tabs.find(t => t.id === state.activeTabId)) {
  state.activeTabId = state.tabs[0].id;
}

/* ---------- Math ---------- */
function linearRegression(points) {
  const valid = points
    .map(p => ({ x: parseFloat(p.x), y: parseFloat(p.y) }))
    .filter(p => Number.isFinite(p.x) && Number.isFinite(p.y));
  if (valid.length < 2) return null;
  const n = valid.length;
  const meanX = valid.reduce((s, p) => s + p.x, 0) / n;
  const meanY = valid.reduce((s, p) => s + p.y, 0) / n;
  let num = 0, den = 0;
  for (const p of valid) {
    num += (p.x - meanX) * (p.y - meanY);
    den += (p.x - meanX) ** 2;
  }
  if (den === 0) return null;
  const m = num / den;
  const b = meanY - m * meanX;
  let ssRes = 0, ssTot = 0;
  for (const p of valid) {
    const yp = m * p.x + b;
    ssRes += (p.y - yp) ** 2;
    ssTot += (p.y - meanY) ** 2;
  }
  const r2 = ssTot === 0 ? 1 : 1 - ssRes / ssTot;
  return { m, b, r2, n, valid };
}

function fmt(v, digits = 6) {
  if (!Number.isFinite(v)) return '—';
  if (v === 0) return '0';
  const abs = Math.abs(v);
  if (abs >= 1e5 || abs < 1e-3) return v.toExponential(Math.max(0, digits - 1));
  return parseFloat(v.toPrecision(digits)).toString();
}
function fmtR2(v) {
  if (!Number.isFinite(v)) return '—';
  return v.toFixed(6);
}

/* ---------- DOM helpers ---------- */
const $ = sel => document.querySelector(sel);
function el(tag, attrs = {}, ...children) {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') n.className = v;
    else if (k === 'html') n.innerHTML = v;
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), v);
    else if (v !== null && v !== undefined && v !== false) n.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return n;
}

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ---------- Rendering ---------- */
let chart = null;

function getTab() { return state.tabs.find(t => t.id === state.activeTabId); }

function countValidPoints(tab) {
  return tab.points.filter(p => {
    const x = parseFloat(p.x), y = parseFloat(p.y);
    return Number.isFinite(x) && Number.isFinite(y);
  }).length;
}

function renderTabs() {
  const host = $('#tabs');
  host.innerHTML = '';
  for (const t of state.tabs) {
    const b = el('button', {
      class: 'tab' + (t.id === state.activeTabId ? ' active' : ''),
      onclick: () => { state.activeTabId = t.id; save(); renderAll(); }
    },
      t.name || 'Untitled',
      el('span', { class: 'count' }, String(countValidPoints(t)))
    );
    host.appendChild(b);
  }
  host.appendChild(el('button', {
    class: 'tab-add',
    title: 'New calibration',
    onclick: () => {
      const t = newTab();
      state.tabs.push(t);
      state.activeTabId = t.id;
      save();
      renderAll();
    }
  }, '+'));
}

function renderMeta() {
  const tab = getTab();
  if (!tab) { $('#meta').textContent = '—'; return; }
  const fit = linearRegression(tab.points);
  const parts = [
    `TABS ${state.tabs.length}`,
    `POINTS ${countValidPoints(tab)}`,
    fit ? `R² ${fmtR2(fit.r2)}` : 'R² —'
  ];
  $('#meta').textContent = parts.join('  ·  ');
}

function renderWorkspace() {
  const ws = $('#workspace');
  ws.innerHTML = '';
  const tab = getTab();
  if (!tab) {
    ws.appendChild(el('div', { class: 'empty-state' },
      el('div', { class: 'big' }, 'No calibrations yet'),
      el('div', {}, 'Click the + button above to start.')
    ));
    return;
  }

  /* ----- Info card ----- */
  const infoCard = el('div', { class: 'card' },
    el('div', { class: 'card-title' }, 'Calibration',
      el('div', { class: 'actions' },
        el('button', {
          class: 'danger-btn btn-sm',
          title: 'Delete this calibration',
          onclick: () => {
            if (state.tabs.length === 1) {
              if (!confirm('This will reset the only calibration. Continue?')) return;
              const nt = newTab('Calibration 1');
              state.tabs = [nt];
              state.activeTabId = nt.id;
            } else {
              if (!confirm(`Delete "${tab.name}"? This cannot be undone.`)) return;
              const idx = state.tabs.findIndex(t => t.id === tab.id);
              state.tabs.splice(idx, 1);
              state.activeTabId = state.tabs[Math.max(0, idx - 1)].id;
            }
            save(); renderAll();
          }
        }, 'Delete')
      )
    ),
    el('div', { class: 'info-row' },
      field('Name', tab.name, v => { tab.name = v; save(); renderTabs(); renderMeta(); }, 'text', 'e.g. MFC-01 / H2'),
      field('Gas', tab.gas, v => { tab.gas = v; save(); renderChart(); renderMeta(); }, 'text', 'N2, H2, CH4…'),
      field('Units', tab.units, v => { tab.units = v; save(); renderChart(); renderCalculators(); }, 'text', 'sccm'),
    )
  );
  ws.appendChild(infoCard);

  /* ----- Grid: left (data), right (chart + stats + calculators) ----- */
  const grid = el('div', { class: 'grid' });
  ws.appendChild(grid);

  /* Left column: data */
  const leftCol = el('div', {});
  const dataCard = el('div', { class: 'card' },
    el('div', { class: 'card-title' }, 'Data points',
      el('div', { class: 'actions' },
        el('button', { class: 'btn btn-sm', onclick: () => pasteFromClipboard(tab), title: 'Paste tab/comma/space separated x y pairs' }, 'Paste'),
        el('button', { class: 'btn btn-sm', onclick: () => clearPoints(tab) }, 'Clear'),
      )
    )
  );
  dataCard.appendChild(renderTable(tab));
  dataCard.appendChild(el('div', { class: 'data-actions' },
    el('button', {
      class: 'btn', onclick: () => {
        tab.points.push({ x: '', y: '' });
        save(); renderAll();
      }
    }, '+ Add point'),
    el('button', {
      class: 'btn', onclick: () => {
        for (let i = 0; i < 5; i++) tab.points.push({ x: '', y: '' });
        save(); renderAll();
      }
    }, '+5 rows')
  ));
  leftCol.appendChild(dataCard);
  grid.appendChild(leftCol);

  /* Right column: chart, stats, correction, calculators */
  const rightCol = el('div', {});

  // Chart card
  const chartCard = el('div', { class: 'card' },
    el('div', { class: 'card-title' }, 'Plot & fit'),
    el('div', { class: 'chart-wrap' },
      el('canvas', { id: 'chart' }),
      el('div', { class: 'chart-empty', id: 'chart-empty' },
        el('div', { class: 'big' }, 'Awaiting data'),
        el('div', {}, 'Enter at least 2 valid (x, y) points.')
      )
    )
  );
  rightCol.appendChild(chartCard);

  // Stats card
  const statsCard = el('div', { class: 'card' },
    el('div', { class: 'card-title' }, 'Linear fit'),
    el('div', { class: 'stats', id: 'stats' }),
    el('div', { class: 'equation', id: 'equation' })
  );
  rightCol.appendChild(statsCard);

  // Correction factor card
  const cfCard = el('div', { class: 'card' },
    el('div', { class: 'card-title' }, 'Gas correction factor'),
    el('div', { class: 'cf-row' },
      field('Correction factor (CF)', tab.correctionFactor, v => {
        tab.correctionFactor = v;
        save(); renderCalculators();
      }, 'number', '1.0', '0.0001'),
      el('button', {
        class: 'btn btn-sm', onclick: () => {
          tab.correctionFactor = '1';
          save(); renderWorkspace();
        }
      }, 'Reset to 1.0 (N₂)'),
    ),
    el('div', { class: 'cf-hint', id: 'cf-hint' }, '')
  );
  rightCol.appendChild(cfCard);

  // Calculators card
  const calcCard = el('div', { class: 'card' },
    el('div', { class: 'card-title' }, 'Calculators'),
    el('div', { id: 'calculators' })
  );
  rightCol.appendChild(calcCard);

  grid.appendChild(rightCol);

  renderChart();
  renderStats();
  renderCalculators();
}

function field(label, value, onInput, type = 'text', placeholder = '', step = null) {
  const inp = el('input', {
    type, placeholder,
    value: value ?? '',
    step: step || undefined,
    oninput: e => onInput(e.target.value)
  });
  return el('div', { class: 'field' }, el('label', {}, label), inp);
}

function renderTable(tab) {
  const wrap = el('div', { class: 'table-wrap' });
  const table = el('table');
  const unit = tab.units || '';
  const thead = el('thead', {}, el('tr', {},
    el('th', { class: 'idx' }, '#'),
    el('th', { class: 'num' }, unit ? `Setpoint (${unit})` : 'Setpoint'),
    el('th', { class: 'num' }, unit ? `Actual flow (${unit})` : 'Actual flow'),
    el('th', { class: 'act' }, '')
  ));
  const tbody = el('tbody');

  tab.points.forEach((p, i) => {
    const xVal = parseFloat(p.x), yVal = parseFloat(p.y);
    const isBlank = (p.x === '' || p.x == null) && (p.y === '' || p.y == null);
    const isInvalid = !isBlank && (!Number.isFinite(xVal) || !Number.isFinite(yVal));

    const xInp = el('input', {
      type: 'number', step: 'any', value: p.x,
      placeholder: '—',
      oninput: e => { tab.points[i].x = e.target.value; save(); renderChart(); renderStats(); renderCalculators(); renderMeta(); updateRowValidity(tr, tab.points[i]); }
    });
    const yInp = el('input', {
      type: 'number', step: 'any', value: p.y,
      placeholder: '—',
      oninput: e => { tab.points[i].y = e.target.value; save(); renderChart(); renderStats(); renderCalculators(); renderMeta(); updateRowValidity(tr, tab.points[i]); }
    });

    const tr = el('tr', { class: isInvalid ? 'invalid' : '' },
      el('td', { class: 'idx' }, String(i + 1)),
      el('td', {}, xInp),
      el('td', {}, yInp),
      el('td', {}, el('button', {
        class: 'row-del', title: 'Remove',
        onclick: () => {
          tab.points.splice(i, 1);
          if (tab.points.length === 0) tab.points.push({ x: '', y: '' });
          save(); renderAll();
        }
      }, '×'))
    );
    tbody.appendChild(tr);
  });

  table.appendChild(thead);
  table.appendChild(tbody);
  wrap.appendChild(table);
  return wrap;
}

function updateRowValidity(tr, p) {
  const xVal = parseFloat(p.x), yVal = parseFloat(p.y);
  const isBlank = (p.x === '' || p.x == null) && (p.y === '' || p.y == null);
  const isInvalid = !isBlank && (!Number.isFinite(xVal) || !Number.isFinite(yVal));
  tr.classList.toggle('invalid', isInvalid);
}

function clearPoints(tab) {
  if (!confirm('Clear all data points in this calibration?')) return;
  tab.points = [ { x: '', y: '' }, { x: '', y: '' }, { x: '', y: '' } ];
  save(); renderAll();
}

async function pasteFromClipboard(tab) {
  try {
    const text = await navigator.clipboard.readText();
    if (!text) return;
    const rows = text.split(/\r?\n/).map(r => r.trim()).filter(Boolean);
    const parsed = [];
    for (const r of rows) {
      const parts = r.split(/[\s,;\t]+/).filter(Boolean);
      if (parts.length >= 2) {
        parsed.push({ x: parts[0], y: parts[1] });
      }
    }
    if (parsed.length === 0) { toast('No (x, y) pairs detected'); return; }
    // Replace blank trailing rows, then append
    tab.points = tab.points.filter(p => p.x !== '' || p.y !== '');
    tab.points.push(...parsed);
    save(); renderAll();
    toast(`Imported ${parsed.length} points`);
  } catch (e) {
    toast('Paste failed — clipboard blocked');
  }
}

/* ---------- Chart ---------- */
function renderChart() {
  const tab = getTab();
  if (!tab) return;
  const canvas = $('#chart');
  if (!canvas) return;
  const fit = linearRegression(tab.points);
  const emptyEl = $('#chart-empty');
  if (emptyEl) emptyEl.style.display = fit ? 'none' : 'flex';

  const valid = tab.points
    .map(p => ({ x: parseFloat(p.x), y: parseFloat(p.y) }))
    .filter(p => Number.isFinite(p.x) && Number.isFinite(p.y));

  let trendData = [];
  if (fit) {
    const xs = valid.map(p => p.x);
    const minX = Math.min(...xs);
    const maxX = Math.max(...xs);
    const pad = (maxX - minX) * 0.08 || 1;
    const x0 = minX - pad, x1 = maxX + pad;
    trendData = [{ x: x0, y: fit.m * x0 + fit.b }, { x: x1, y: fit.m * x1 + fit.b }];
  }

  const unit = tab.units || '';
  const xLabel = unit ? `Setpoint (${unit})` : 'Setpoint';
  const yLabel = unit ? `Actual flow (${unit})` : 'Actual flow';

  if (chart) { chart.destroy(); chart = null; }

  chart = new Chart(canvas, {
    type: 'scatter',
    data: {
      datasets: [
        {
          label: 'Data',
          data: valid,
          backgroundColor: '#ffb454',
          borderColor: '#ffb454',
          pointRadius: 5,
          pointHoverRadius: 7,
          showLine: false,
          order: 1
        },
        {
          label: 'Fit',
          data: trendData,
          borderColor: '#4ade80',
          backgroundColor: 'transparent',
          borderWidth: 2,
          borderDash: [6, 4],
          pointRadius: 0,
          showLine: true,
          type: 'line',
          order: 2
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 200 },
      plugins: {
        legend: {
          labels: {
            color: '#9aa4b7',
            font: { family: 'Outfit', size: 12 },
            boxWidth: 12,
            boxHeight: 12
          }
        },
        tooltip: {
          backgroundColor: '#1a2029',
          borderColor: '#364152',
          borderWidth: 1,
          titleColor: '#e6ebf2',
          bodyColor: '#e6ebf2',
          titleFont: { family: 'Space Mono', size: 11 },
          bodyFont: { family: 'JetBrains Mono', size: 12 },
          padding: 10,
          callbacks: {
            label: (ctx) => {
              const x = ctx.parsed.x, y = ctx.parsed.y;
              return `(${fmt(x, 5)}, ${fmt(y, 5)})${unit ? ' ' + unit : ''}`;
            }
          }
        }
      },
      scales: {
        x: {
          type: 'linear',
          title: { display: true, text: xLabel, color: '#9aa4b7', font: { family: 'Space Mono', size: 11 } },
          grid: { color: '#1e252f' },
          ticks: { color: '#9aa4b7', font: { family: 'JetBrains Mono', size: 11 } },
          border: { color: '#262f3d' }
        },
        y: {
          title: { display: true, text: yLabel, color: '#9aa4b7', font: { family: 'Space Mono', size: 11 } },
          grid: { color: '#1e252f' },
          ticks: { color: '#9aa4b7', font: { family: 'JetBrains Mono', size: 11 } },
          border: { color: '#262f3d' }
        }
      }
    }
  });
}

/* ---------- Stats ---------- */
function renderStats() {
  const tab = getTab();
  if (!tab) return;
  const stats = $('#stats');
  const eq = $('#equation');
  if (!stats || !eq) return;
  const fit = linearRegression(tab.points);

  stats.innerHTML = '';
  const mk = (label, value, na) => el('div', { class: 'stat' },
    el('div', { class: 'label' }, label),
    el('div', { class: 'value' + (na ? ' na' : '') }, value)
  );
  if (fit) {
    stats.appendChild(mk('Slope  m', fmt(fit.m, 6)));
    stats.appendChild(mk('Intercept  b', fmt(fit.b, 6)));
    stats.appendChild(mk('R²', fmtR2(fit.r2)));
    const bStr = fit.b >= 0 ? `+ ${fmt(fit.b, 6)}` : `− ${fmt(Math.abs(fit.b), 6)}`;
    eq.innerHTML = `<span class="mute">y =</span> ${fmt(fit.m, 6)}<span class="mute">·x</span> ${bStr}  <span class="mute" style="margin-left:12px">(n = ${fit.n})</span>`;
  } else {
    stats.appendChild(mk('Slope  m', '—', true));
    stats.appendChild(mk('Intercept  b', '—', true));
    stats.appendChild(mk('R²', '—', true));
    eq.innerHTML = '<span class="mute">Enter at least 2 valid (x, y) points to compute the fit.</span>';
  }

  renderMeta();
}

/* ---------- Calculators ---------- */
function renderCalculators() {
  const tab = getTab();
  if (!tab) return;
  const host = $('#calculators');
  const cfHint = $('#cf-hint');
  if (!host) return;
  host.innerHTML = '';

  const fit = linearRegression(tab.points);
  const cf = parseFloat(tab.correctionFactor);
  const cfValid = Number.isFinite(cf) && cf > 0;
  const unit = tab.units || '';

  if (cfHint) {
    if (!cfValid) cfHint.textContent = 'Enter a positive correction factor. Use 1.0 for N₂ (the reference gas).';
    else if (Math.abs(cf - 1) < 1e-12) cfHint.textContent = 'CF = 1.0 → results are unchanged (N₂ reference).';
    else cfHint.textContent = `CF = ${fmt(cf, 6)} → calculators scale for ${tab.gas || 'the target gas'} relative to N₂.`;
  }

  /* Set → Actual:  actual = (set * m + b) * CF */
  const setInp = el('input', {
    type: 'number', step: 'any', value: tab.calcSetInput ?? '',
    placeholder: '—',
    oninput: e => { tab.calcSetInput = e.target.value; save(); renderCalculators(); }
  });
  const setResult = el('div', { class: 'result' });

  const setVal = parseFloat(tab.calcSetInput);
  if (fit && cfValid && Number.isFinite(setVal)) {
    const actual = (setVal * fit.m + fit.b) * cf;
    setResult.textContent = `${fmt(actual, 6)}${unit ? ' ' + unit : ''}`;
    setResult.classList.remove('na');
  } else {
    setResult.classList.add('na');
    setResult.textContent = !fit ? 'need fit' : !cfValid ? 'need CF' : 'enter setpoint';
  }

  const calc1 = el('div', { class: 'calc' },
    el('div', { class: 'field' },
      el('label', {}, unit ? `Setpoint (${unit})` : 'Setpoint'),
      setInp
    ),
    el('div', { class: 'arrow' }, '→'),
    el('div', { class: 'field' },
      el('label', {}, `Actual flow${unit ? ' (' + unit + ')' : ''}`),
      setResult
    )
  );
  host.appendChild(calc1);

  /* Actual → Set:  set = (actual - b) / m / CF */
  const actInp = el('input', {
    type: 'number', step: 'any', value: tab.calcActualInput ?? '',
    placeholder: '—',
    oninput: e => { tab.calcActualInput = e.target.value; save(); renderCalculators(); }
  });
  const actResult = el('div', { class: 'result' });

  const actVal = parseFloat(tab.calcActualInput);
  if (fit && cfValid && Number.isFinite(actVal)) {
    if (fit.m === 0) {
      actResult.classList.add('na');
      actResult.textContent = 'slope is 0';
    } else {
      const setpoint = (actVal - fit.b) / fit.m / cf;
      actResult.textContent = `${fmt(setpoint, 6)}${unit ? ' ' + unit : ''}`;
      actResult.classList.remove('na');
    }
  } else {
    actResult.classList.add('na');
    actResult.textContent = !fit ? 'need fit' : !cfValid ? 'need CF' : 'enter actual';
  }

  const calc2 = el('div', { class: 'calc' },
    el('div', { class: 'field' },
      el('label', {}, `Actual flow${unit ? ' (' + unit + ')' : ''}`),
      actInp
    ),
    el('div', { class: 'arrow' }, '→'),
    el('div', { class: 'field' },
      el('label', {}, unit ? `Setpoint (${unit})` : 'Setpoint'),
      actResult
    )
  );
  host.appendChild(calc2);

  // Formula footer
  const formulas = el('div', { class: 'cf-hint', style: 'margin-top:14px' },
    `actual = (setpoint · m + b) · CF     ·     setpoint = (actual − b) / m / CF`
  );
  host.appendChild(formulas);
}

/* ---------- Full render ---------- */
function renderAll() {
  renderTabs();
  renderWorkspace();
  renderMeta();
}

/* Initial paint */
renderAll();

/* Keep chart responsive if the window resizes */
window.addEventListener('resize', () => { if (chart) chart.resize(); });

/* Warn if localStorage is unavailable */
try {
  localStorage.setItem('__mfc_test__', '1');
  localStorage.removeItem('__mfc_test__');
} catch (e) {
  toast('Warning: storage unavailable — data will not persist');
}
</script>
</body>
</html>
